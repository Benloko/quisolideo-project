version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: quisolideo_app
    volumes:
      - ./:/var/www/html
      - ./vendor:/var/www/html/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=1
    depends_on:
      - db

  web:
    image: nginx:stable
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: quisolideo
      MYSQL_USER: quisolideo_user
      MYSQL_PASSWORD: secretpassword
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
